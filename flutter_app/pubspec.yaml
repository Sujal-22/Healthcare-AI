name: healthcare_ai
description: AI-powered healthcare chatbot using RAG + Ollama
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP client
  http: ^1.2.1
  
  # State management
  provider: ^6.1.2
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_markdown: ^0.6.22     # render AI markdown responses
  loading_animation_widget: ^1.2.1  # typing indicator
  
  # Storage (save chat history locally)
  shared_preferences: ^2.2.3
  
  # UUID for session IDs
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

